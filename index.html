<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Loja de Futebol</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm py-3"
style="border-bottom:3px solid #0d6efd;">
<div class="container-fluid px-4">

<a class="navbar-brand fw-bold fs-3" href="#">
Resenha <span class="text-primary">Sports</span>
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link fw-bold text-uppercase" href="#">Início</a>
</li>

<li class="nav-item">
<a class="nav-link fw-bold text-uppercase" href="#produtos">Camisetas</a>
</li>

<li class="nav-item">
<a class="nav-link fw-bold text-uppercase d-flex align-items-center"
href="#" data-bs-toggle="modal" data-bs-target="#cartModal">
Carrinho
<span id="cart-count" class="badge bg-primary ms-2">0</span>
</a>
</li>

</ul>
</div>
</div>
</nav>

<!-- HERO -->
<header class="text-white d-flex align-items-center shadow-lg"
style="height:60vh;margin-top:80px;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1574629810360-7efbbe195018') center/cover;">
<div class="container text-center">
<h1 class="display-3 fw-bold text-uppercase">
Vista o seu <span class="text-primary">Manto</span>
</h1>
<p class="lead fw-bold">
Novas camisas da temporada <span id="ano"></span>
</p>
</div>
</header>

<!-- PRODUTOS -->
<div id="produtos" class="container mt-5 pb-5">
<div class="row g-4">

<script>
const produtos = [
{nome:"Corinthians",preco:120,img:"Corinthians.jpg",desc:"Camisa inspirada no manto do Timão."},
{nome:"Flamengo",preco:100,img:"Flamengo.jpg",desc:"Camisa rubro-negra tradicional."},
{nome:"Fluminense",preco:111,img:"Fluminense.jpg",desc:"Camisa tricolor clássica."},
{nome:"São Paulo",preco:100,img:"São Paulo.jpg",desc:"Camisa do Tricolor Paulista."},
{nome:"Atlético MG",preco:100,img:"Atletico MG.jpg",desc:"Camisa inspirada no Galo."},
{nome:"Red Bull Bragantino",preco:130,img:"RedBull.jpg",desc:"Camisa moderna e estilosa."},
{nome:"Vasco",preco:90,img:"Vasco.jpg",desc:"Camisa cruzmaltina clássica."},
{nome:"Palmeiras",preco:110,img:"Palmeiras.jpg",desc:"Camisa alviverde histórica."}
];

document.write(produtos.map(p=>`
<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card h-100 border-0 shadow-sm rounded-4 text-center">
<img src="./image/${p.img}" class="card-img-top" style="height:300px;object-fit:cover">
<div class="card-body p-4">
<h5 class="fw-bold text-uppercase">${p.nome}</h5>
<p class="fw-bold text-primary fs-4">R$ ${p.preco},00</p>

<button class="btn btn-dark w-100 rounded-pill add"
data-nome="${p.nome}" data-preco="${p.preco}" data-img="${p.img}">
Adicionar ao Carrinho
</button>

<button class="btn btn-outline-primary w-100 rounded-pill mt-2 ver"
data-nome="${p.nome}" data-preco="${p.preco}"
data-img="${p.img}" data-desc="${p.desc}">
Ver mais
</button>
</div>
</div>
</div>
`).join(""));
</script>

</div>
</div>

<!-- MODAL PRODUTO -->
<div class="modal fade" id="modalProduto">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content rounded-4">
<div class="modal-header bg-dark text-white">
<h5 id="mTitulo"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body text-center">
<img id="mImg" class="img-fluid rounded mb-3">
<p id="mDesc" class="text-muted"></p>
<h4 class="text-primary">R$ <span id="mPreco"></span>,00</h4>
</div>
<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Voltar</button>
<button id="mAdd" class="btn btn-primary fw-bold">Adicionar</button>
</div>
</div>
</div>
</div>

<!-- MODAL CARRINHO -->
<div class="modal fade" id="cartModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content rounded-4">
<div class="modal-header bg-dark text-white">
<h5 class="fw-bold">🛒 Seu Carrinho</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<div id="cart-items"></div>
<hr>
<div class="d-flex justify-content-between fw-bold">
<span>Total:</span>
<span>R$ <span id="cart-total">0</span>,00</span>
</div>
</div>
</div>
</div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4 mt-5"
style="border-top:5px solid #0d6efd;">
© <span id="ano2"></span> Resenha Sports
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
const contador = document.getElementById("cart-count");
const cartItems = document.getElementById("cart-items");
const cartTotal = document.getElementById("cart-total");

function atualizarCarrinho() {
contador.innerText = carrinho.length;
localStorage.setItem("carrinho", JSON.stringify(carrinho));
renderizarCarrinho();
}

function renderizarCarrinho() {
cartItems.innerHTML = "";
let total = 0;

if (carrinho.length === 0) {
cartItems.innerHTML = "<p class='text-muted text-center'>Carrinho vazio</p>";
cartTotal.innerText = "0";
return;
}

carrinho.forEach((item, i) => {
total += Number(item.preco);
cartItems.innerHTML += `
<div class="d-flex align-items-center mb-3">
<img src="./image/${item.img}" width="60" class="rounded me-3">
<div class="flex-grow-1">
<strong>${item.nome}</strong><br>
<small>R$ ${item.preco},00</small>
</div>
<button class="btn btn-sm btn-outline-danger" onclick="removerItem(${i})">✕</button>
</div>`;
});

cartTotal.innerText = total;
}

function removerItem(i) {
carrinho.splice(i,1);
atualizarCarrinho();
}

document.querySelectorAll(".add").forEach(b=>{
b.onclick=()=>{ carrinho.push(b.dataset); atualizarCarrinho(); }
});

const modalProduto = new bootstrap.Modal(modalProduto);
let atual;

document.querySelectorAll(".ver").forEach(b=>{
b.onclick=()=>{
atual=b.dataset;
mTitulo.innerText=atual.nome;
mImg.src="./image/"+atual.img;
mDesc.innerText=atual.desc;
mPreco.innerText=atual.preco;
modalProduto.show();
};
});

mAdd.onclick=()=>{ carrinho.push(atual); atualizarCarrinho(); modalProduto.hide(); };

document.getElementById("cartModal")
.addEventListener("show.bs.modal", renderizarCarrinho);

ano.innerText = ano2.innerText = new Date().getFullYear();
atualizarCarrinho();
</script>

</body>
</html>
