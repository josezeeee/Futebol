<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./css/styles.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container">

    <a class="navbar-brand" href="#">FootCoder</a>

    <div>
      <a href="index.html" class="text-white me-3">Inicio</a>
      <a href="carrinho.html" class="text-white">Carrinho</a>
    </div>

  </div>
</nav>


<div class="container mt-5 pt-5">

<h2>Produtos</h2>

<div class="row" id="lista-produtos">

</div>

</div>


<script>

fetch("http://localhost:3000/produtos")
.then(res => res.json())
.then(produtos => {

const lista = document.getElementById("lista-produtos");

lista.innerHTML = produtos.map(p => `

<div class="col-md-3 mb-4">

<div class="card">

<img src="./image/${p.imagem}" class="card-img-top">

<div class="card-body text-center">

<h5>${p.nome}</h5>

<p>R$ ${p.preco}</p>

<button class="btn btn-dark"
onclick="addCarrinho('${p.nome}', ${p.preco})">

Adicionar

</button>

</div>

</div>

</div>

`).join("");

});


function addCarrinho(nome, preco){

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

carrinho.push({nome, preco});

localStorage.setItem("carrinho", JSON.stringify(carrinho));

alert("Adicionado ao carrinho");

}

</script>


</body>
</html>
