<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resenha Sports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
}

/* CARDS */
.card{
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

.card img{
height:300px;
object-fit:cover;
}

/* BUSCA */
#buscar{
max-width:400px;
margin:auto;
}

/* BANNER */
.banner{
height: 300px;
background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('./image/banner-brasileirao.webp') center/cover no-repeat;
}

/* RESPONSIVO */
@media (max-width: 768px){
.banner{
height:200px;
}

.card img{
height:220px;
}
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<span class="navbar-brand fw-bold fs-4">
Resenha <span class="text-primary">Sports</span>
</span>

<button class="btn btn-outline-light"
data-bs-toggle="modal"
data-bs-target="#cartModal">

Carrinho 🛒
<span id="cart-count" class="badge bg-primary">0</span>

</button>

</div>
</nav>

<header class="banner text-white text-center d-flex align-items-center justify-content-center">
  <div>
    <h1 class="fw-bold"></h1>
    <p><span id="ano"></span></p>
  </div>
</header>

<div class="container mt-4">
<input type="text" id="buscar" class="form-control" placeholder="Buscar camisa...">
</div>

<section class="container mt-4">
<div class="row g-4" id="lista-produtos"></div>
</section>

<!-- MODAL PRODUTO -->
<div class="modal fade" id="modalProduto">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">

<div class="modal-header bg-dark text-white">
<h5 id="mTitulo"></h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">

<img id="mImg" class="img-fluid mb-3">
<p id="mDesc"></p>

<select id="mTamanho" class="form-select mb-3">
<option value="">Escolha o tamanho</option>
<option>P</option>
<option>M</option>
<option>G</option>
<option>GG</option>
</select>

<h4 class="text-primary">
R$ <span id="mPreco"></span>,00
</h4>

</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Voltar</button>
<button id="mAdd" class="btn btn-primary">Adicionar</button>
</div>

</div>
</div>
</div>

<!-- CARRINHO -->
<div class="modal fade" id="cartModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">

<div class="modal-header bg-dark text-white">
<h5>Seu Carrinho</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<div id="cart-items"></div>

<hr>

<div class="d-flex justify-content-between">
<strong>Total</strong>
<strong>R$ <span id="cart-total">0</span>,00</strong>
</div>

<button class="btn btn-success w-100 mt-3" onclick="abrirPagamento()">
Finalizar Compra
</button>

</div>

</div>
</div>
</div>

<!-- PAGAMENTO -->
<div class="modal fade" id="modalPagamento">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content">

<div class="modal-header bg-success text-white">
<h5>Pagamento</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<select id="metodoPagamento" class="form-control mb-3">
<option value="Pix">Pix</option>
<option value="Cartao">Cartão</option>
<option value="Boleto">Boleto</option>
</select>

<button class="btn btn-primary w-100" onclick="confirmarPagamento()">
Confirmar Pagamento
</button>

</div>

</div>
</div>
</div>

<!-- TOAST AVISO -->
<div id="toastAviso" class="toast align-items-center text-bg-danger border-0 position-fixed bottom-0 end-0 m-3">
  <div class="d-flex">
    <div class="toast-body">
      ⚠️ Escolha um tamanho antes de continuar!
    </div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
  </div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">
© <span id="ano2"></span> Resenha Sports
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const produtos=[

{nome:"Corinthians",preco:120,img:"Corinthians.jpg",desc:"Camisa do Timão"},
{nome:"Flamengo",preco:100,img:"Flamengo.jpg",desc:"Camisa Rubro Negra"},
{nome:"Fluminense",preco:111,img:"Fluminense.jpg",desc:"Camisa Tricolor"},
{nome:"São Paulo",preco:100,img:"São Paulo.jpg",desc:"Camisa Paulista"},
{nome:"Atlético MG",preco:100,img:"Atletico MG.jpg",desc:"Camisa do Galo"},
{nome:"Bragantino",preco:130,img:"RedBull.jpg",desc:"Camisa Red Bull"},
{nome:"Vasco",preco:90,img:"Vasco.jpg",desc:"Camisa Vasco"},
{nome:"Palmeiras",preco:110,img:"Palmeiras.jpg",desc:"Camisa Palmeiras"}

]

const lista=document.getElementById("lista-produtos")

function carregarProdutos(listaProdutos){

lista.innerHTML=""

listaProdutos.forEach((p,i)=>{

lista.innerHTML+=`

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card">

<img src="./image/${p.img}" class="card-img-top">

<div class="card-body text-center">

<h5>${p.nome}</h5>

<p class="text-primary fw-bold">
R$ ${p.preco},00
</p>

<select class="form-select mb-2 tamanho" data-id="${i}">
<option value="">Tamanho</option>
<option>P</option>
<option>M</option>
<option>G</option>
<option>GG</option>
</select>

<button class="btn btn-dark w-100 mb-2 add" data-id="${i}">
Adicionar
</button>

<button class="btn btn-outline-primary w-100 ver" data-id="${i}">
Ver mais
</button>

</div>
</div>
</div>

`

})

}

carregarProdutos(produtos)

/* BUSCA */
document.getElementById("buscar")
.addEventListener("input",function(){

const valor=this.value.toLowerCase()

const filtrados=produtos.filter(p=>
p.nome.toLowerCase().includes(valor)
)

carregarProdutos(filtrados)

})

/* CARRINHO */
let carrinho=JSON.parse(localStorage.getItem("carrinho"))||[]

const contador=document.getElementById("cart-count")
const cartItems=document.getElementById("cart-items")
const cartTotal=document.getElementById("cart-total")

const mTitulo=document.getElementById("mTitulo")
const mImg=document.getElementById("mImg")
const mDesc=document.getElementById("mDesc")
const mPreco=document.getElementById("mPreco")
const mAdd=document.getElementById("mAdd")

const modalProduto=new bootstrap.Modal(
document.getElementById("modalProduto")
)

const modalPagamento=new bootstrap.Modal(
document.getElementById("modalPagamento")
)

let atual

function mostrarAviso(){
  const toastEl = document.getElementById('toastAviso')
  const toast = new bootstrap.Toast(toastEl)
  toast.show()
}

function atualizarCarrinho(){
contador.innerText=carrinho.length
localStorage.setItem("carrinho",JSON.stringify(carrinho))
renderizarCarrinho()
}

function renderizarCarrinho(){

cartItems.innerHTML=""
let total=0

if(carrinho.length===0){
cartItems.innerHTML="<p class='text-center text-muted'>Carrinho vazio</p>"
cartTotal.innerText="0"
return
}

carrinho.forEach((item,i)=>{

total+=item.preco

cartItems.innerHTML+=`

<div class="d-flex align-items-center mb-3">

<img src="./image/${item.img}" width="60" class="me-3 rounded">

<div class="flex-grow-1">

<strong>${item.nome}</strong><br>
Tamanho: ${item.tamanho || "-"}<br>
R$ ${item.preco}

</div>

<button class="btn btn-sm btn-danger" onclick="removerItem(${i})">
X
</button>

</div>

`

})

cartTotal.innerText=total

}

function removerItem(i){
carrinho.splice(i,1)
atualizarCarrinho()
}

document.addEventListener("click",e=>{

if(e.target.classList.contains("add")){

let id=e.target.dataset.id
let select=document.querySelector(`.tamanho[data-id='${id}']`)
let tamanho=select.value

if(!tamanho){
mostrarAviso()
select.style.border="2px solid red"

select.addEventListener("change",()=>{
select.style.border=""
})

return
}

carrinho.push({...produtos[id], tamanho})
atualizarCarrinho()

}

if(e.target.classList.contains("ver")){

let id=e.target.dataset.id

atual=produtos[id]

mTitulo.innerText=atual.nome
mImg.src="./image/"+atual.img
mDesc.innerText=atual.desc
mPreco.innerText=atual.preco

modalProduto.show()

}

})

mAdd.onclick=()=>{

let select=document.getElementById("mTamanho")
let tamanho=select.value

if(!tamanho){
mostrarAviso()
select.style.border="2px solid red"

select.addEventListener("change",()=>{
select.style.border=""
})

return
}

carrinho.push({...atual, tamanho})
atualizarCarrinho()
modalProduto.hide()

}

function abrirPagamento(){

if(carrinho.length===0){
mostrarAviso()
return
}

modalPagamento.show()

}

function confirmarPagamento(){

let metodo = document.getElementById("metodoPagamento").value

localStorage.removeItem("carrinho")

if(metodo === "Pix"){
window.location.href = "pagamento_pix.html"
}

else if(metodo === "Cartao"){
window.location.href = "pagamento_cartao_credito.html"
}

else if(metodo === "Boleto"){
window.location.href = "pagamento_boleto.html"
}

}

document.getElementById("cartModal")
.addEventListener("show.bs.modal",renderizarCarrinho)

/* ANO */
document.getElementById("ano").innerText=new Date().getFullYear()
document.getElementById("ano2").innerText=new Date().getFullYear()

atualizarCarrinho()

</script>

</body>
</html>
